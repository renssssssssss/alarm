<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALARM — ブラウザアラーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- ヘッダー -->
    <div class="app-header">
      <div class="app-title">ALARM</div>
      <div class="app-subtitle">ブラウザアラーム</div>
    </div>

    <!-- ポップアップ許可ガイドバナー -->
    <div class="popup-banner" id="popup-banner">
      <div class="popup-banner-title">URL起動にはポップアップ許可が必要です</div>
      <div class="popup-banner-body">
        このサイトのポップアップを許可すると、アラーム発火時に指定URLが自動で開きます。
      </div>
      <ul class="banner-steps" id="banner-steps"></ul>
      <div class="popup-banner-actions">
        <button class="banner-btn banner-btn-chrome" id="btn-open-setting">⚙ 設定を開く</button>
        <button class="banner-btn banner-btn-copy"   id="btn-copy-url">URLをコピー</button>
        <button class="banner-btn banner-btn-dismiss" id="btn-dismiss-banner">後で</button>
      </div>
    </div>

    <!-- 現在時刻 -->
    <div class="clock-display">
      <div class="clock-time" id="clock">--:--:--</div>
      <div class="clock-date" id="date-display"></div>
    </div>

    <!-- 時刻設定 -->
    <div class="card">
      <div class="card-label">アラーム時刻</div>
      <div class="time-row">
        <input class="time-input" type="number" id="alarm-h" min="0" max="23" value="07">
        <span class="time-sep">:</span>
        <input class="time-input" type="number" id="alarm-m" min="0" max="59" value="00">
      </div>
      <div class="repeat-row" id="days-row"></div>
    </div>

    <!-- ラベル -->
    <div class="card">
      <div class="card-label">ラベル</div>
      <input class="text-input" type="text" id="alarm-label" placeholder="アラームの名前（省略可）">
    </div>

    <!-- URL設定 -->
    <div class="card">
      <div class="card-label">URLを開く（省略可）</div>
      <input class="text-input" type="url" id="alarm-url" placeholder="https://example.com">
    </div>

    <!-- アラーム音設定 -->
    <div class="card">
      <div class="card-label">アラーム音</div>

      <!-- 音源選択タブ -->
      <div class="audio-tabs">
        <button class="audio-tab active" data-tab="preset">プリセット</button>
        <button class="audio-tab"        data-tab="upload">ファイルを選択</button>
      </div>

      <!-- プリセット一覧 -->
      <div class="audio-panel" id="panel-preset">
        <div class="preset-list" id="preset-list">
          <!-- JSで動的生成 -->
        </div>
      </div>

      <!-- ファイルアップロード -->
      <div class="audio-panel" id="panel-upload" hidden>
        <div class="file-zone" id="file-zone">
          <input type="file" id="audio-file" accept="audio/*">
          <div class="file-zone-text">クリックまたはドロップで音声ファイルを選択</div>
          <div class="file-zone-name" id="file-name"></div>
        </div>
      </div>

      <!-- 音量・プレビュー（共通） -->
      <div class="volume-row">
        <span class="vol-label">音量</span>
        <input type="range" id="volume" min="0" max="100" value="80" step="1">
        <span class="vol-val" id="vol-out">80%</span>
      </div>
      <div class="preview-row">
        <button class="btn-secondary" id="preview-btn">▶ プレビュー</button>
        <button class="btn-secondary" id="stop-btn" hidden>■ 停止</button>
      </div>
    </div>

    <!-- 自動停止設定 -->
    <div class="card">
      <div class="card-label">自動停止</div>
      <div class="autostop-row">
        <label class="autostop-label" for="autostop-toggle">アラームを自動で停止する</label>
        <button class="alarm-toggle on" id="autostop-toggle" aria-label="自動停止オン/オフ"></button>
      </div>
      <div class="autostop-detail" id="autostop-detail">
        <div class="volume-row" style="margin-top: 12px;">
          <span class="vol-label">停止まで</span>
          <input type="range" id="autostop-sec" min="5" max="120" value="10" step="5">
          <span class="vol-val" id="autostop-sec-out" style="width: 48px;">10秒</span>
        </div>
      </div>
    </div>

    <!-- 追加ボタン -->
    <div class="btn-row">
      <button class="btn-primary" id="add-btn">＋ アラームを追加</button>
    </div>

    <!-- アラームリスト -->
    <div class="section-title">設定済みアラーム</div>
    <div id="alarm-list">
      <div class="empty-state" id="empty-state">アラームがありません</div>
    </div>

  </div><!-- /.app -->


  <!-- 発火オーバーレイ -->
  <div class="fire-overlay" id="fire-overlay" hidden>
    <div class="fire-time"  id="fire-time">07:00</div>
    <div class="fire-label" id="fire-label">アラーム</div>
    <div class="fire-url-label" id="fire-url-label"></div>
    <a class="fire-url-btn" id="fire-url-btn" href="#" target="_blank" hidden>このURLを開く →</a>
    <div class="fire-autostop" id="fire-autostop" hidden>
      <div class="fire-autostop-bar-wrap">
        <div class="fire-autostop-bar" id="fire-autostop-bar"></div>
      </div>
      <div class="fire-autostop-label" id="fire-autostop-label">10秒後に自動停止</div>
    </div>
    <div class="fire-queue-badge" id="fire-queue-badge" hidden></div>
    <button class="fire-dismiss" id="fire-dismiss">今すぐ停止 / 次へ</button>
  </div>

  <!-- トースト通知 -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
