
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  .app{font-family:'Syne',sans-serif;padding:1.5rem;max-width:520px;margin:0 auto;}
  .app-header{display:flex;align-items:baseline;gap:10px;margin-bottom:1.5rem;}
  .app-title{font-size:26px;font-weight:800;color:var(--color-text-primary);letter-spacing:-0.5px;}
  .app-subtitle{font-size:13px;color:var(--color-text-tertiary);}
  .clock-display{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.25rem;text-align:center;border:0.5px solid var(--color-border-tertiary);}
  .clock-time{font-family:'DM Mono',monospace;font-size:46px;font-weight:500;color:var(--color-text-primary);letter-spacing:-1px;line-height:1;}
  .clock-date{font-size:12px;color:var(--color-text-tertiary);margin-top:5px;}
  .card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;}
  .card-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:10px;}
  .time-row{display:flex;gap:8px;align-items:center;}
  .time-input{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--color-text-primary);background:transparent;border:none;border-bottom:2px solid var(--color-border-primary);outline:none;width:80px;text-align:center;padding:4px 0;transition:border-color 0.15s;}
  .time-input:focus{border-bottom-color:#378ADD;}
  .time-sep{font-family:'DM Mono',monospace;font-size:28px;color:var(--color-text-secondary);font-weight:500;}
  .repeat-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .day-btn{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;width:34px;height:34px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all 0.15s;}
  .day-btn.on{background:#185FA5;border-color:#185FA5;color:#E6F1FB;}
  .text-input{font-family:'Syne',sans-serif;font-size:14px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;width:100%;transition:border-color 0.15s;}
  .text-input:focus{border-color:#378ADD;}
  .file-zone{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);padding:14px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;background:var(--color-background-secondary);}
  .file-zone:hover{border-color:#378ADD;}
  .file-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .file-zone-text{font-size:13px;color:var(--color-text-secondary);}
  .file-zone-name{font-size:12px;color:#185FA5;font-weight:600;margin-top:4px;}
  .volume-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .vol-label{font-size:12px;color:var(--color-text-secondary);width:52px;flex-shrink:0;}
  .vol-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--color-text-secondary);width:32px;text-align:right;flex-shrink:0;}
  .btn-row{display:flex;gap:8px;margin-top:1rem;}
  .btn-primary{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:10px 20px;border-radius:var(--border-radius-md);border:none;background:#185FA5;color:#E6F1FB;cursor:pointer;flex:1;transition:opacity 0.15s;}
  .btn-primary:hover{opacity:0.88;}
  .btn-secondary{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;padding:10px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:background 0.15s;}
  .btn-secondary:hover{background:var(--color-background-secondary);}
  .alarm-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:8px;background:var(--color-background-primary);transition:border-color 0.15s;}
  .alarm-item.active{border-color:#185FA5;}
  .alarm-item-time{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--color-text-primary);min-width:70px;}
  .alarm-item-info{flex:1;min-width:0;}
  .alarm-item-label{font-size:13px;font-weight:600;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .alarm-item-meta{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .alarm-toggle{width:36px;height:20px;border-radius:10px;background:var(--color-border-secondary);border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0;}
  .alarm-toggle.on{background:#185FA5;}
  .alarm-toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:white;top:3px;left:3px;transition:transform 0.2s;}
  .alarm-toggle.on::after{transform:translateX(16px);}
  .alarm-del{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:16px;padding:4px;border-radius:4px;flex-shrink:0;transition:color 0.15s;}
  .alarm-del:hover{color:#E24B4A;}
  .section-title{font-size:13px;font-weight:700;color:var(--color-text-secondary);letter-spacing:0.04em;margin:1.5rem 0 0.75rem;}
  .empty-state{text-align:center;padding:24px;color:var(--color-text-tertiary);font-size:13px;border:0.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);}

  /* ポップアップガイドバナー */
  .popup-banner{background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:12px 14px;margin-bottom:1rem;display:none;}
  .popup-banner.show{display:block;}
  .popup-banner-title{font-size:13px;font-weight:700;color:var(--color-text-warning);margin-bottom:6px;}
  .popup-banner-body{font-size:12px;color:var(--color-text-warning);line-height:1.6;}
  .popup-banner-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .banner-btn{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--border-radius-md);cursor:pointer;border:none;transition:opacity 0.15s;}
  .banner-btn:hover{opacity:0.82;}
  .banner-btn-chrome{background:#185FA5;color:#E6F1FB;}
  .banner-btn-copy{background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);}
  .banner-btn-dismiss{background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);}
  .banner-steps{margin-top:8px;padding-left:0;list-style:none;}
  .banner-steps li{font-size:12px;color:var(--color-text-warning);padding:2px 0;padding-left:16px;position:relative;}
  .banner-steps li::before{content:'→';position:absolute;left:0;font-size:11px;}

  /* アラーム発火オーバーレイ */
  .fire-overlay{position:fixed;inset:0;background:rgba(24,95,165,0.92);display:none;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:1.5rem;}
  .fire-overlay.show{display:flex;}
  .fire-time{font-family:'DM Mono',monospace;font-size:72px;font-weight:500;color:#E6F1FB;letter-spacing:-2px;line-height:1;}
  .fire-label{font-size:18px;font-weight:700;color:#B5D4F4;}
  .fire-url-btn{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;padding:14px 32px;border-radius:var(--border-radius-lg);background:#E6F1FB;color:#185FA5;border:none;cursor:pointer;transition:opacity 0.15s;text-decoration:none;display:inline-block;text-align:center;}
  .fire-url-btn:hover{opacity:0.9;}
  .fire-dismiss{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:#85B7EB;background:transparent;border:0.5px solid #378ADD;padding:8px 24px;border-radius:var(--border-radius-md);cursor:pointer;transition:opacity 0.15s;}
  .fire-dismiss:hover{opacity:0.8;}
  .fire-url-label{font-size:12px;color:#85B7EB;}

  /* toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 18px;font-size:13px;font-weight:600;color:var(--color-text-primary);transition:transform 0.3s;z-index:300;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>

<div class="app">
  <div class="app-header">
    <div class="app-title">ALARM</div>
    <div class="app-subtitle">ブラウザアラーム</div>
  </div>

  <!-- ポップアップ許可ガイド -->
  <div class="popup-banner" id="popup-banner">
    <div class="popup-banner-title">URL起動にはポップアップ許可が必要です</div>
    <div class="popup-banner-body">このサイトのポップアップを許可すると、アラーム発火時に指定URLが自動で開きます。</div>
    <ul class="banner-steps" id="banner-steps"></ul>
    <div class="popup-banner-actions">
      <button class="banner-btn banner-btn-chrome" id="btn-open-setting">⚙ Chrome設定を開く</button>
      <button class="banner-btn banner-btn-copy" id="btn-copy-url">URLをコピー</button>
      <button class="banner-btn banner-btn-dismiss" id="btn-dismiss-banner">後で</button>
    </div>
  </div>

  <div class="clock-display">
    <div class="clock-time" id="clock">--:--:--</div>
    <div class="clock-date" id="date-display"></div>
  </div>

  <div class="card">
    <div class="card-label">アラーム時刻</div>
    <div class="time-row">
      <input class="time-input" type="number" id="alarm-h" min="0" max="23" value="07">
      <span class="time-sep">:</span>
      <input class="time-input" type="number" id="alarm-m" min="0" max="59" value="00">
    </div>
    <div class="repeat-row" id="days-row"></div>
  </div>

  <div class="card">
    <div class="card-label">ラベル</div>
    <input class="text-input" type="text" id="alarm-label" placeholder="アラームの名前（省略可）">
  </div>

  <div class="card">
    <div class="card-label">URLを開く（省略可）</div>
    <input class="text-input" type="url" id="alarm-url" placeholder="https://example.com">
  </div>

  <div class="card">
    <div class="card-label">アラーム音</div>
    <div class="file-zone" id="file-zone">
      <input type="file" id="audio-file" accept="audio/*">
      <div class="file-zone-text">クリックまたはドロップで音声ファイルを選択</div>
      <div class="file-zone-name" id="file-name"></div>
    </div>
    <div class="volume-row">
      <span class="vol-label">音量</span>
      <input type="range" id="volume" min="0" max="100" value="80" step="1" style="flex:1;">
      <span class="vol-val" id="vol-out">80%</span>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;">
      <button class="btn-secondary" id="preview-btn" style="font-size:12px;padding:6px 14px;">▶ プレビュー</button>
      <button class="btn-secondary" id="stop-btn" style="font-size:12px;padding:6px 14px;display:none;">■ 停止</button>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="add-btn">＋ アラームを追加</button>
  </div>

  <div class="section-title">設定済みアラーム</div>
  <div id="alarm-list">
    <div class="empty-state" id="empty-state">アラームがありません</div>
  </div>
</div>

<!-- 発火オーバーレイ -->
<div class="fire-overlay" id="fire-overlay">
  <div class="fire-time" id="fire-time">07:00</div>
  <div class="fire-label" id="fire-label">アラーム</div>
  <div class="fire-url-label" id="fire-url-label"></div>
  <a class="fire-url-btn" id="fire-url-btn" href="#" target="_blank" style="display:none;">このURLを開く →</a>
  <button class="fire-dismiss" id="fire-dismiss">閉じる</button>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS=['日','月','火','水','木','金','土'];
let alarms=[], audioBlob=null, audioUrl=null, previewAudio=null, fireAudio=null;
const selectedDays=new Set();

// ブラウザ判定
function getBrowser(){
  const ua=navigator.userAgent;
  if(ua.includes('Chrome')&&!ua.includes('Edg'))return'chrome';
  if(ua.includes('Firefox'))return'firefox';
  if(ua.includes('Safari')&&!ua.includes('Chrome'))return'safari';
  if(ua.includes('Edg'))return'edge';
  return'other';
}

// ポップアップバナー
const browser=getBrowser();
const bannerStepsData={
  chrome:['アドレスバー左の🔒アイコンをクリック','「ポップアップとリダイレクト」→「許可」を選択'],
  firefox:['アドレスバーの🔒アイコンをクリック','「このサイトのポップアップを許可する」を選択'],
  safari:['Safari →「このWebサイトの設定」→ポップアップを「許可」に'],
  edge:['アドレスバーの🔒アイコンをクリック','「ポップアップ」→「許可」を選択'],
  other:['ブラウザのアドレスバー付近のアイコンからポップアップ許可を設定してください']
};

function showPopupBanner(){
  const banner=document.getElementById('popup-banner');
  if(banner.dataset.dismissed)return;
  banner.classList.add('show');
  const steps=document.getElementById('banner-steps');
  steps.innerHTML='';
  (bannerStepsData[browser]||bannerStepsData.other).forEach(s=>{
    const li=document.createElement('li');li.textContent=s;steps.appendChild(li);
  });
}

document.getElementById('btn-open-setting').addEventListener('click',()=>{
  if(browser==='chrome'){
    window.open('chrome://settings/content/popups','_blank');
  } else if(browser==='edge'){
    window.open('edge://settings/content/popups','_blank');
  } else {
    showToast('アドレスバー付近のアイコンから設定してください');
  }
  document.getElementById('popup-banner').dataset.dismissed='1';
  document.getElementById('popup-banner').classList.remove('show');
});

document.getElementById('btn-copy-url').addEventListener('click',()=>{
  navigator.clipboard.writeText(location.href).then(()=>showToast('URLをコピーしました'));
});

document.getElementById('btn-dismiss-banner').addEventListener('click',()=>{
  document.getElementById('popup-banner').dataset.dismissed='1';
  document.getElementById('popup-banner').classList.remove('show');
});

// 曜日ボタン
const daysRow=document.getElementById('days-row');
DAYS.forEach((d,i)=>{
  const btn=document.createElement('button');
  btn.className='day-btn';btn.textContent=d;btn.dataset.day=i;
  btn.onclick=()=>{
    if(selectedDays.has(i)){selectedDays.delete(i);btn.classList.remove('on');}
    else{selectedDays.add(i);btn.classList.add('on');}
  };
  daysRow.appendChild(btn);
});

function pad(n){return String(n).padStart(2,'0');}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const wd=DAYS[now.getDay()];
  document.getElementById('date-display').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${wd})`;
  checkAlarms(now);
}
setInterval(updateClock,1000);
updateClock();

document.getElementById('volume').addEventListener('input',e=>{
  document.getElementById('vol-out').textContent=e.target.value+'%';
});

document.getElementById('audio-file').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  audioBlob=file;
  if(audioUrl)URL.revokeObjectURL(audioUrl);
  audioUrl=URL.createObjectURL(file);
  document.getElementById('file-name').textContent=file.name;
});

document.getElementById('file-zone').addEventListener('dragover',e=>e.preventDefault());
document.getElementById('file-zone').addEventListener('drop',e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('audio/')){
    audioBlob=file;
    if(audioUrl)URL.revokeObjectURL(audioUrl);
    audioUrl=URL.createObjectURL(file);
    document.getElementById('file-name').textContent=file.name;
  }
});

document.getElementById('preview-btn').addEventListener('click',()=>{
  if(!audioUrl){showToast('音声ファイルを選択してください');return;}
  stopPreview();
  previewAudio=new Audio(audioUrl);
  previewAudio.volume=parseInt(document.getElementById('volume').value)/100;
  previewAudio.play();
  previewAudio.onended=()=>{document.getElementById('stop-btn').style.display='none';document.getElementById('preview-btn').style.display='';};
  document.getElementById('preview-btn').style.display='none';
  document.getElementById('stop-btn').style.display='';
});

document.getElementById('stop-btn').addEventListener('click',stopPreview);

function stopPreview(){
  if(previewAudio){previewAudio.pause();previewAudio.currentTime=0;previewAudio=null;}
  document.getElementById('stop-btn').style.display='none';
  document.getElementById('preview-btn').style.display='';
}

// URL入力があればバナー表示
document.getElementById('alarm-url').addEventListener('blur',e=>{
  if(e.target.value.trim()) showPopupBanner();
});

document.getElementById('add-btn').addEventListener('click',()=>{
  const h=parseInt(document.getElementById('alarm-h').value);
  const m=parseInt(document.getElementById('alarm-m').value);
  if(isNaN(h)||isNaN(m)||h<0||h>23||m<0||m>59){showToast('時刻を正しく入力してください');return;}
  const urlVal=document.getElementById('alarm-url').value.trim();
  const alarm={
    id:Date.now(),
    time:`${pad(h)}:${pad(m)}`,
    label:document.getElementById('alarm-label').value||`アラーム ${pad(h)}:${pad(m)}`,
    url:urlVal,
    days:[...selectedDays],
    audioUrl:audioUrl,
    audioName:audioBlob?audioBlob.name:null,
    volume:parseInt(document.getElementById('volume').value),
    active:true,fired:false
  };
  alarms.push(alarm);
  renderAlarms();
  showToast('アラームを追加しました');
  document.getElementById('alarm-label').value='';
  if(urlVal) showPopupBanner();
});

function renderAlarms(){
  const list=document.getElementById('alarm-list');
  const empty=document.getElementById('empty-state');
  list.querySelectorAll('.alarm-item').forEach(el=>el.remove());
  if(alarms.length===0){empty.style.display='';return;}
  empty.style.display='none';
  alarms.slice().reverse().forEach(alarm=>{
    const item=document.createElement('div');
    item.className='alarm-item'+(alarm.active?' active':'');
    const daysStr=alarm.days.length===0?'一度のみ':alarm.days.length===7?'毎日':alarm.days.map(d=>DAYS[d]).join(' ');
    const meta=[daysStr,alarm.audioName?'音声あり':'ビープ音',alarm.url?'URL付き':''].filter(Boolean).join(' · ');
    item.innerHTML=`
      <div class="alarm-item-time">${alarm.time}</div>
      <div class="alarm-item-info">
        <div class="alarm-item-label">${alarm.label}</div>
        <div class="alarm-item-meta">${meta}</div>
      </div>
      <button class="alarm-toggle ${alarm.active?'on':''}" data-id="${alarm.id}"></button>
      <button class="alarm-del" data-id="${alarm.id}">✕</button>
    `;
    list.insertBefore(item,empty);
    item.querySelector('.alarm-toggle').onclick=()=>{
      const a=alarms.find(x=>x.id==alarm.id);
      if(a){a.active=!a.active;a.fired=false;renderAlarms();}
    };
    item.querySelector('.alarm-del').onclick=()=>{
      alarms=alarms.filter(x=>x.id!=alarm.id);
      renderAlarms();showToast('アラームを削除しました');
    };
  });
}

function checkAlarms(now){
  const curTime=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const curDay=now.getDay();
  alarms.forEach(alarm=>{
    if(!alarm.active)return;
    if(alarm.time!==curTime){alarm.fired=false;return;}
    if(alarm.fired)return;
    const dayMatch=alarm.days.length===0||alarm.days.includes(curDay);
    if(!dayMatch)return;
    if(now.getSeconds()<3){
      alarm.fired=true;
      fireAlarm(alarm);
    }
  });
}

function fireAlarm(alarm){
  // 音声再生
  if(alarm.audioUrl){
    fireAudio=new Audio(alarm.audioUrl);
    fireAudio.volume=alarm.volume/100;
    fireAudio.loop=true;
    fireAudio.play().catch(()=>{});
  } else {
    beep();
  }

  // オーバーレイ表示
  document.getElementById('fire-time').textContent=alarm.time;
  document.getElementById('fire-label').textContent=alarm.label;

  const urlBtn=document.getElementById('fire-url-btn');
  const urlLabel=document.getElementById('fire-url-label');
  if(alarm.url){
    urlBtn.href=alarm.url;
    urlBtn.textContent=alarm.url.length>40?alarm.url.slice(0,40)+'…':alarm.url+' →';
    urlBtn.style.display='inline-block';
    urlLabel.textContent='クリックでURLを開きます';

    // 自動open試行（許可済みの場合）
    try{
      const w=window.open(alarm.url,'_blank');
      if(w) urlLabel.textContent='URLを自動で開きました';
    }catch(e){}
  } else {
    urlBtn.style.display='none';
    urlLabel.textContent='';
  }

  document.getElementById('fire-overlay').classList.add('show');

  if(alarm.days.length===0){
    alarm.active=false;
    renderAlarms();
  }
}

document.getElementById('fire-dismiss').addEventListener('click',()=>{
  document.getElementById('fire-overlay').classList.remove('show');
  if(fireAudio){fireAudio.pause();fireAudio.currentTime=0;fireAudio=null;}
});

function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.4,0.8].forEach(t=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=880;osc.type='sine';
      gain.gain.setValueAtTime(0.3,ctx.currentTime+t);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.35);
      osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+0.35);
    });
  }catch(e){}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

renderAlarms();
</script>
